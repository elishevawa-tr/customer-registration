<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Customer Registration</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
      padding: 48px 40px;
      max-width: 460px;
      width: 100%;
    }
    h1 {
      font-size: 28px;
      color: #1a1a2e;
      margin-bottom: 8px;
    }
    .subtitle {
      color: #6b7280;
      margin-bottom: 32px;
      font-size: 15px;
    }
    label {
      display: block;
      font-weight: 600;
      color: #374151;
      margin-bottom: 6px;
      font-size: 14px;
    }
    input {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #e5e7eb;
      border-radius: 10px;
      font-size: 16px;
      transition: border-color 0.2s;
      outline: none;
      margin-bottom: 20px;
    }
    input:focus {
      border-color: #667eea;
    }
    button {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(102,126,234,0.4);
    }
    button:active { transform: translateY(0); }
    .toast {
      position: fixed;
      top: 24px;
      right: 24px;
      padding: 14px 24px;
      border-radius: 10px;
      color: #fff;
      font-weight: 600;
      font-size: 14px;
      opacity: 0;
      transform: translateY(-12px);
      transition: all 0.3s;
      z-index: 100;
    }
    .toast.success { background: #10b981; }
    .toast.error { background: #ef4444; }
    .toast.show { opacity: 1; transform: translateY(0); }
    .admin-link {
      display: block;
      text-align: center;
      margin-top: 24px;
      color: #667eea;
      font-weight: 500;
      text-decoration: none;
      font-size: 14px;
    }
    .admin-link:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Register</h1>
    <p class="subtitle">Enter your details to get started</p>
    <form id="regForm">
      <label for="name">Full Name</label>
      <input type="text" id="name" placeholder="John Doe" required>
      <label for="telephone">Telephone</label>
      <input type="tel" id="telephone" placeholder="+1 (555) 000-0000" required>
      <button type="submit">Submit Registration</button>
    </form>
    <a href="/admin.html" class="admin-link">Admin Dashboard</a>
  </div>
  <div class="toast" id="toast"></div>
  <script>
    const toast = document.getElementById('toast');
    function showToast(msg, type) {
      toast.textContent = msg;
      toast.className = 'toast ' + type + ' show';
      setTimeout(() => toast.classList.remove('show'), 3000);
    }
    document.getElementById('regForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = document.getElementById('name').value.trim();
      const telephone = document.getElementById('telephone').value.trim();
      try {
        const res = await fetch('/api/registrations', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, telephone })
        });
        if (!res.ok) throw new Error('Failed');
        showToast('Registration submitted successfully!', 'success');
        e.target.reset();
      } catch {
        showToast('Something went wrong. Please try again.', 'error');
      }
    });
  </script>
</body>
</html>
